{% set name = "rospo" %}
{% set version = "0.15.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ferama/rospo/archive/v{{ version }}.tar.gz
  sha256: 338157a7a34abf35f7fdb84a1667c49e07d95cd3ef33e8e5f9ce2cb0e55d4647

build:
  number: 0

requirements:
  build:
    - {{ compiler('go-nocgo') }}
    - go-licenses

test:
  commands:
    - rospo --help

about:
  home: https://github.com/ferama/rospo
  license: MIT
  license_file:
    - LICENSE
    - license-files/
  summary: Simple, reliable, persistent ssh tunnels with embedded ssh server
  dev_url: https://github.com/ferama/rospo

extra:
  recipe-maintainers:
    - danielnachun
